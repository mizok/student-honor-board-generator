<p-toast />

<div class="preview" [class.preview--drawer-open]="board.drawerOpen()">
  <!-- Toolbar -->
  <header class="preview__toolbar">
    <p-button
      icon="pi pi-arrow-left"
      label="重新上傳"
      severity="secondary"
      size="small"
      (onClick)="board.resetToUpload()"
    />
    <div class="preview__toolbar-actions">
      <p-button
        [icon]="board.fixedWidth() ? 'pi pi-lock' : 'pi pi-lock-open'"
        [label]="board.fixedWidth() ? '固定寬度' : '自適應'"
        severity="secondary"
        size="small"
        [outlined]="!board.fixedWidth()"
        (onClick)="board.fixedWidth.update(v => !v)"
      />
      <p-button
        icon="pi pi-pencil"
        label="編輯內容"
        severity="secondary"
        size="small"
        (onClick)="board.toggleDrawer()"
      />
      <p-splitbutton
        label="下載 PDF"
        icon="pi pi-download"
        [model]="exportItems"
        (onClick)="download('pdf')"
        size="small"
      />
    </div>
  </header>

  <!-- Board canvas -->
  <main class="preview__canvas" id="board-preview-target">
    @if (board.parsedData(); as data) {
      <app-template-outlet
        [templateId]="board.templateId()"
        [data]="data"
        [columns]="board.columns()"
        [maskNames]="board.maskNames()"
        [fixedWidth]="board.fixedWidth()"
      />
    }
  </main>

  <!-- Edit drawer -->
  <app-edit-drawer />
</div>
