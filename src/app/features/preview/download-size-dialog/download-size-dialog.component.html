<div class="download-size-dialog">
  <p class="download-size-dialog__copy">請先選擇匯出尺寸，再開始下載。</p>

  <div class="download-size-dialog__field">
    <label class="download-size-dialog__label">輸出寬度</label>
    <p-select-button
      [options]="data.widthOptions"
      [ngModel]="selectedWidth()"
      (ngModelChange)="selectWidth($event)"
      [allowEmpty]="false"
      optionLabel="label"
      optionValue="value"
    />
  </div>

  <div class="download-size-dialog__actions">
    <p-button label="取消" severity="secondary" [text]="true" (onClick)="cancel()" />
    <p-button label="下載" (onClick)="confirm()" />
  </div>
</div>
